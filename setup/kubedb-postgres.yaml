apiVersion: kubedb.com/v1
kind: Postgres
metadata:
  name: pg-ha-cluster
  namespace: demo
spec:
  clientAuthMode: md5
  deletionPolicy: WipeOut
  podTemplate:
    spec:
      containers:
        - name: postgres
          resources:
            limits:
              memory: 3Gi
            requests:
              cpu: 2
              memory: 2Gi
  replicas: 3
  replication:
    walKeepSize: 3000
    walLimitPolicy: WALKeepSize
  standbyMode: Hot
  storage:
    accessModes:
      - ReadWriteOnce
    resources:
      requests:
        storage: 20Gi
  storageType: Durable
  version: "16.4"
